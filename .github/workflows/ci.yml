name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: flashsale
        options: >-
          --health-cmd "pg_isready -U user"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379
      REDIS_REPLICA_URL: ""
      DATABASE_URL: postgres://user:pass@localhost:5432/flashsale?sslmode=disable
      SERVER_PORT: "8080"
      RESERVATION_TTL_SECONDS: "600"
      RATE_LIMIT_CAPACITY: "10"
      RATE_LIMIT_RATE_PER_SEC: "2"
      RECONCILIATION_INTERVAL_SECONDS: "60"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Apply migrations
        run: |
          for f in migrations/*.sql; do
            PGPASSWORD=pass psql -h localhost -U user -d flashsale -f "$f"
          done

      - name: Test
        run: go test ./internal/... -v -race -count=1 -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.txt
          fail_ci_if_error: false

  chaos:
    name: Chaos Tests
    runs-on: ubuntu-latest
    needs: test
    # Only run on push to main — chaos tests are slow
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run chaos tests
        run: go test ./chaos/... -v -timeout 10m

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
