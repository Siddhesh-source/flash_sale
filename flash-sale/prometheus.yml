global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "recording_rules.yml"

scrape_configs:
  - job_name: 'flash-sale'
    static_configs:
      - targets: ['host.docker.internal:8080']
    scrape_interval: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
